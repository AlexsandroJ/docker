---
# GRAFANA DEPLOYMENT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: docker.io/grafana/grafana:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: "admin"
        - name: GF_USERS_ALLOW_SIGN_UP
          value: "false"
        - name: GF_ANALYTICS_REPORTING_ENABLED
          value: "false"
        ports:
        - containerPort: 3000
        volumeMounts:
        - name: datasources
          mountPath: /etc/grafana/provisioning/datasources
        - name: dashboards
          mountPath: /etc/grafana/provisioning/dashboards
        resources:
          requests: { cpu: 200m, memory: 512Mi }
          limits:   { cpu: 500m, memory: 512Mi }
      volumes:
      - name: datasources
        configMap:
          name: grafana-datasources
      - name: dashboards
        configMap:
          name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: default
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30300

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

# MongoDB Deployment + Service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: mongo:4.4
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: "root"
            - name: MONGO_INITDB_ROOT_PASSWORD
              value: "example"
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
      volumes:
        - name: mongo-data
          persistentVolumeClaim:
            claimName: mongo-data

---
apiVersion: v1
kind: Service
metadata:
  name: mongo
spec:
  type: LoadBalancer
  selector:
    app: mongo
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017

# Mongo Express
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: express
spec:
  replicas: 1
  selector:
    matchLabels:
      app: express
  template:
    metadata:
      labels:
        app: express
    spec:
      containers:
        - name: express
          image: mongo-express
          ports:
            - containerPort: 8081
          env:
            - name: ME_CONFIG_BASICAUTH_USERNAME
              value: "root"
            - name: ME_CONFIG_BASICAUTH_PASSWORD
              value: "example"
            - name: ME_CONFIG_MONGODB_SERVER
              value: "mongo"
            - name: ME_CONFIG_MONGODB_AUTH_USERNAME
              value: "root"
            - name: ME_CONFIG_MONGODB_AUTH_PASSWORD
              value: "example"

---
apiVersion: v1
kind: Service
metadata:
  name: express
spec:
  type: LoadBalancer
  selector:
    app: express
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081

# API Node.js
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apivoltz
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apivoltz
  template:
    metadata:
      labels:
        app: apivoltz
    spec:
      containers:
        - name: apivoltz
          image: alexsandrojsilva0/apivoltz:latest # Substitua
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: PORT_HTTP
              value: "3001"
            - name: PORT_HTTPS
              value: "443"
            - name: DB_USER
              value: "root"
            - name: DB_PASS
              value: "example"
            - name: DB_HOST
              value: "mongo"
            - name: DB_PORT
              value: "27017"
            - name: DB_NAME
              value: "tests"
            - name: DEV
              value: "false"
            - name: API_URL
              value: "http://api:3001"
            - name: BASE_BATTERY_ID
              value: "0x120"
            - name: BASE_CONTROLLER_ID
              value: "0x300"
            - name: MQTT_BROKER
              value: "mqtt://mosquitto:1883"
            - name: MQTT_TOPIC
              value: "moto/telemetria"

---
apiVersion: v1
kind: Service
metadata:
  name: apivoltz
spec:
  type: LoadBalancer
  selector:
    app: apivoltz
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001


