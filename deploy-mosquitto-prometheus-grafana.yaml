apiVersion: v1
kind: Namespace
metadata:
  name: iot-monitoring
---
# MOSQUITTO CONFIG
apiVersion: v1
kind: ConfigMap
metadata:
  name: mosquitto-config
  namespace: default
data:
  mosquitto.conf: |
    # Listener TCP padrão (para dispositivos IoT, mosquitto_pub/sub)
    listener 1883
    allow_anonymous true
    
    # Listener WebSocket para navegadores (HiveMQ Demo)
    listener 8083
    protocol websockets
    allow_anonymous true
    
    # Logs e persistência
    log_type all
    log_dest stdout
    persistence false
---
# MOSQUITTO DEPLOYMENT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mosquitto
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mosquitto
  template:
    metadata:
      labels:
        app: mosquitto
    spec:
      containers:
      - name: mosquitto
        image: docker.io/library/eclipse-mosquitto:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 1883
        volumeMounts:
        - name: config
          mountPath: /mosquitto/config/mosquitto.conf
          subPath: mosquitto.conf
        resources:
          requests: { cpu: 30m, memory: 48Mi }
          limits:   { cpu: 80m, memory: 96Mi }
      volumes:
      - name: config
        configMap:
          name: mosquitto-config
---
apiVersion: v1
kind: Service
metadata:
  name: mosquitto
  namespace: default
spec:
  type: NodePort
  selector:
    app: mosquitto
  ports:
  - name: mqtt
    port: 1883
    targetPort: 1883
    nodePort: 31883
  - name: websocket  # ← NOVO
    port: 8083
    targetPort: 8083
    nodePort: 30883  # Faixa válida: 30000-32767
---
# EXPORTER DEPLOYMENT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mosquitto-exporter
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mosquitto-exporter
  template:
    metadata:
      labels:
        app: mosquitto-exporter
    spec:
      containers:
      - name: exporter
        image: docker.io/sapcc/mosquitto-exporter:0.8.0
        imagePullPolicy: IfNotPresent
        args:
        - "-e=tcp://mosquitto:1883"
        - "-b=0.0.0.0:9234"
        ports:
        - containerPort: 9234
        startupProbe:
          httpGet: { path: /metrics, port: 9234 }
          failureThreshold: 20
          periodSeconds: 3
        resources:
          requests: { cpu: 20m, memory: 32Mi }
          limits:   { cpu: 50m, memory: 64Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: mosquitto-exporter
  namespace: default
spec:
  selector:
    app: mosquitto-exporter
  ports:
  - port: 9234
    targetPort: 9234
---
# PROMETHEUS CONFIG
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: default
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s
    scrape_configs:
      - job_name: 'mosquitto-exporter'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['mosquitto-exporter:9234']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: docker.io/prom/prometheus:latest
        imagePullPolicy: IfNotPresent
        args:
        - "--config.file=/etc/prometheus/prometheus.yml"
        - "--storage.tsdb.path=/prometheus"
        - "--storage.tsdb.retention.time=24h"
        ports:
        - containerPort: 9090
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus/prometheus.yml
          subPath: prometheus.yml
        - name: data
          mountPath: /prometheus
        resources:
          requests: { cpu: 40m, memory: 96Mi }
          limits:   { cpu: 100m, memory: 192Mi }
      volumes:
      - name: config
        configMap:
          name: prometheus-config
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: default
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
  - port: 9090
    targetPort: 9090
    nodePort: 30909
---
# GRAFANA DATASOURCE PROVISIONING
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: default
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: false
---
