# ==========================================
# MOSQUITTO CONFIG
# ==========================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: mosquitto-config
  namespace: default
data:
  mosquitto.conf: |
    listener 1883
    allow_anonymous true
    listener 8083
    protocol websockets
    allow_anonymous true
    log_type all
    log_dest stdout
    persistence false

---
# MOSQUITTO DEPLOYMENT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mosquitto
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mosquitto
  template:
    metadata:
      labels:
        app: mosquitto
    spec:
      containers:
      - name: mosquitto
        image: docker.io/library/eclipse-mosquitto:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 1883
        volumeMounts:
        - name: config
          mountPath: /mosquitto/config/mosquitto.conf
          subPath: mosquitto.conf
        resources:
          requests: { cpu: 100m, memory: 256Mi }
          limits:   { cpu: 200m, memory: 256Mi }
      volumes:
      - name: config
        configMap:
          name: mosquitto-config

---
# MOSQUITTO SERVICE
apiVersion: v1
kind: Service
metadata:
  name: mosquitto
  namespace: default
spec:
  type: NodePort # ALTERADO: De LoadBalancer para NodePort (funciona 100% offline)
  selector:
    app: mosquitto
  ports:
  - name: mqtt
    protocol: TCP
    port: 1883
    targetPort: 1883
    nodePort: 31883 # ADICIONADO: Porta fixa para acesso local
  - name: websocket
    protocol: TCP
    port: 8083
    targetPort: 8083
    nodePort: 30883 # ADICIONADO: Porta fixa para websocket local

---
# EXPORTER DEPLOYMENT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mosquitto-exporter
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mosquitto-exporter
  template:
    metadata:
      labels:
        app: mosquitto-exporter
    spec:
      containers:
      - name: exporter
        image: docker.io/sapcc/mosquitto-exporter:0.8.0
        imagePullPolicy: IfNotPresent
        args:
        - "-e=tcp://mosquitto:1883"
        - "-b=0.0.0.0:9234"
        ports:
        - containerPort: 9234
        startupProbe:
          httpGet: { path: /metrics, port: 9234 }
          failureThreshold: 20
          periodSeconds: 3
        resources:
          requests: { cpu: 100m, memory: 256Mi }
          limits:   { cpu: 200m, memory: 256Mi }

---
apiVersion: v1
kind: Service
metadata:
  name: mosquitto-exporter
  namespace: default
spec:
  type: ClusterIP # ALTERADO: De LoadBalancer para ClusterIP (não precisa de acesso externo, só o Prometheus acessa)
  selector:
    app: mosquitto-exporter
  ports:
  - protocol: TCP
    port: 9234
    targetPort: 9234

---
# PROMETHEUS CONFIG
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: default
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s
    scrape_configs:
      - job_name: 'mosquitto-exporter'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['mosquitto-exporter:9234']

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: docker.io/prom/prometheus:latest
        imagePullPolicy: IfNotPresent
        args:
        - "--config.file=/etc/prometheus/prometheus.yml"
        - "--storage.tsdb.path=/prometheus"
        - "--storage.tsdb.retention.time=24h"
        ports:
        - containerPort: 9090
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus/prometheus.yml
          subPath: prometheus.yml
        - name: data
          mountPath: /prometheus
        resources:
          requests: { cpu: 100m, memory: 256Mi }
          limits:   { cpu: 200m, memory: 256Mi }
      volumes:
      - name: config
        configMap:
          name: prometheus-config
      - name: data
        persistentVolumeClaim:
          claimName: prometheus-data

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: default
spec:
  type: NodePort # ALTERADO: De LoadBalancer para NodePort
  selector:
    app: prometheus
  ports:
  - protocol: TCP
    port: 9090
    targetPort: 9090
    nodePort: 30909 # ADICIONADO: Porta fixa para acesso local

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# GRAFANA DATASOURCE PROVISIONING
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: default
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: false

---
# GRAFANA DEPLOYMENT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: docker.io/grafana/grafana:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: "admin"
        - name: GF_USERS_ALLOW_SIGN_UP
          value: "false"
        - name: GF_ANALYTICS_REPORTING_ENABLED
          value: "false"
        ports:
        - containerPort: 3000
        volumeMounts:
        - name: datasources
          mountPath: /etc/grafana/provisioning/datasources
        - name: grafana-data
          mountPath: /var/lib/grafana
        resources:
          requests: { cpu: 500m, memory: 1Gi }
          limits:   { cpu: 900m, memory: 1Gi }
      volumes:
      - name: datasources
        configMap:
          name: grafana-datasources
      - name: grafana-data
        persistentVolumeClaim:
          claimName: grafana-storage

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: default
spec:
  type: NodePort # ALTERADO: De LoadBalancer para NodePort
  selector:
    app: grafana
  ports:
  - protocol: TCP
    port: 3000
    targetPort: 3000
    nodePort: 31111

---
# MONGO PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

# MongoDB Deployment + Service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: mongo:4.4
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: "root"
            - name: MONGO_INITDB_ROOT_PASSWORD
              value: "example"
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
      volumes:
        - name: mongo-data
          persistentVolumeClaim:
            claimName: mongo-data

---
apiVersion: v1
kind: Service
metadata:
  name: mongo
spec:
  type: NodePort # ALTERADO: De LoadBalancer para NodePort
  selector:
    app: mongo
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017
      nodePort: 30017 # ADICIONADO: Porta fixa para acesso local

# Mongo Express
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: express
spec:
  replicas: 1
  selector:
    matchLabels:
      app: express
  template:
    metadata:
      labels:
        app: express
    spec:
      containers:
        - name: express
          image: mongo-express
          ports:
            - containerPort: 8081
          env:
            - name: ME_CONFIG_BASICAUTH_USERNAME
              value: "root"
            - name: ME_CONFIG_BASICAUTH_PASSWORD
              value: "example"
            - name: ME_CONFIG_MONGODB_SERVER
              value: "mongo"
            - name: ME_CONFIG_MONGODB_AUTH_USERNAME
              value: "root"
            - name: ME_CONFIG_MONGODB_AUTH_PASSWORD
              value: "example"

---
apiVersion: v1
kind: Service
metadata:
  name: express
spec:
  type: NodePort # ALTERADO: De LoadBalancer para NodePort
  selector:
    app: express
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
      nodePort: 30881 # ADICIONADO: Porta fixa para acesso local

# API Node.js
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apivoltz
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apivoltz
  template:
    metadata:
      labels:
        app: apivoltz
    spec:
      containers:
        - name: apivoltz
          image: alexsandrojsilva0/apivoltz:latest
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: DB_USER
              value: "root"
            - name: DB_PASS
              value: "example"
            - name: DB_HOST
              value: "mongo"
            - name: DB_PORT
              value: "27017"
            - name: DB_NAME
              value: "tests"
            - name: DEV
              value: "false"
            - name: API_URL
              value: "https://localhost:3001" # ALTERADO: De https para http (evita erro de certificado self-signed no Node)
            - name: BASE_BATTERY_ID
              value: "0x120"
            - name: BASE_CONTROLLER_ID
              value: "0x300"
            - name: MQTT_BROKER
              value: "mqtt://mosquitto:1883"
            - name: MQTT_TOPIC
              value: "moto/telemetria"

---
apiVersion: v1
kind: Service
metadata:
  name: apivoltz
spec:
  type: NodePort # ALTERADO: De LoadBalancer para NodePort
  selector:
    app: apivoltz
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001
      nodePort: 31443
